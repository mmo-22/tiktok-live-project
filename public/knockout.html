<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>بطولة خروج - تحكم</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
  :root{--bg:#0d0d14;--surface:#181824;--surface2:#242436;--border:#2d2d40;--text:#f0f0f5;--muted:#9a9ab0;--accent:#ff0050;--red:#ef4444;--green:#1dba72;--gold:#ffd700}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;padding:20px;min-height:100vh}
  .wrap{max-width:800px;margin:0 auto;display:flex;flex-direction:column;gap:14px}
  .header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:var(--surface);border-radius:12px}
  .header h1{font-size:22px}
  .badge{font-size:12px;padding:4px 12px;border-radius:20px;background:var(--surface2);color:var(--muted)}
  .badge.active{background:var(--red);color:#fff}
  .card{background:var(--surface);border-radius:14px;padding:16px;border:1px solid var(--border)}
  .card-title{font-size:15px;font-weight:700;margin-bottom:12px;color:var(--red)}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
  .field input,.field select{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:14px}
  .actions{display:flex;gap:8px;flex-wrap:wrap}
  .btn{padding:11px 16px;border:none;border-radius:10px;font-family:inherit;font-weight:700;cursor:pointer;font-size:14px}
  .opt-input{position:relative}
  .opt-input input{padding-right:36px}
  .opt-radio{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:18px;height:18px;border-radius:50%;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s}
  .opt-radio.selected{background:var(--green);border-color:var(--green);color:#fff}
  .player-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:4px;font-size:13px}
  .player-item.alive{background:rgba(29,186,114,.06);border:1px solid rgba(29,186,114,.15)}
  .player-item.dead{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);opacity:.4;text-decoration:line-through}
  .player-name{flex:1;font-weight:700}
  .stats-cards{display:flex;gap:10px;margin-bottom:14px}
  .stat-card{flex:1;background:var(--surface2);border-radius:10px;padding:14px;text-align:center}
  .stat-card-num{font-size:28px;font-weight:900}
  .stat-card-label{font-size:11px;color:var(--muted);margin-top:2px}
  .empty{text-align:center;padding:24px;color:var(--muted);font-size:13px}
  .overlay-link{background:var(--surface2);padding:10px;border-radius:8px;font-family:monospace;font-size:12px;word-break:break-all;cursor:pointer}
  .q-bank{max-height:250px;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
  .q-item{padding:10px 12px;background:var(--surface2);border-radius:8px;cursor:pointer;transition:all .15s;border:1px solid transparent}
  .q-item:hover{border-color:var(--red)}
  .q-item.used{opacity:.2}
  .q-item-text{font-size:13px;font-weight:700}
  .q-item-correct{font-size:11px;color:var(--green)}
</style>
</head>
<body>
<div class="wrap">
  <div class="header"><h1>🏆 بطولة خروج</h1><span class="badge" id="status-badge">متوقف</span></div>

  <div class="card">
    <div class="card-title">📝 المرحلة 1: التسجيل</div>
    <div class="row3">
      <div class="field"><label>كلمة التسجيل</label><input type="text" id="keyword" value="بطولة"></div>
      <div class="field"><label>الحد الأقصى</label><input type="number" id="max-players" value="16" min="4" max="64"></div>
      <div class="field"><label>وقت الإجابة (ثواني)</label><input type="number" id="answer-time" value="15" min="5" max="60"></div>
    </div>
    <div class="actions">
      <button class="btn" onclick="openRegistration()" style="flex:1;background:var(--green);color:#fff">📝 فتح التسجيل</button>
      <button class="btn" onclick="lockRegistration()" style="flex:1;background:var(--red);color:#fff">🔒 إيقاف التسجيل</button>
    </div>
  </div>

  <div class="stats-cards" id="stats-cards">
    <div class="stat-card"><div class="stat-card-num" id="s-alive" style="color:var(--green)">0</div><div class="stat-card-label">باقي</div></div>
    <div class="stat-card"><div class="stat-card-num" id="s-round" style="color:var(--gold)">0</div><div class="stat-card-label">الجولة</div></div>
    <div class="stat-card"><div class="stat-card-num" id="s-elim" style="color:var(--red)">0</div><div class="stat-card-label">طلعوا</div></div>
    <div class="stat-card"><div class="stat-card-num" id="s-total">0</div><div class="stat-card-label">إجمالي</div></div>
  </div>

  <div class="card">
    <div class="card-title">❓ المرحلة 2: الأسئلة</div>
    <div class="card-title" style="color:var(--muted);font-size:12px">من البنك</div>
    <div class="q-bank" id="q-bank"></div>
    <div style="margin-top:14px;border-top:1px solid var(--border);padding-top:14px">
      <div class="card-title" style="color:var(--muted);font-size:12px">سؤال مخصص</div>
      <div class="field"><input type="text" id="custom-q" placeholder="اكتب السؤال..."></div>
      <div class="row2">
        <div class="opt-input field"><input type="text" id="co-1" placeholder="الخيار 1"><div class="opt-radio selected" id="cr-1" onclick="setC(1)">✓</div></div>
        <div class="opt-input field"><input type="text" id="co-2" placeholder="الخيار 2"><div class="opt-radio" id="cr-2" onclick="setC(2)">✓</div></div>
      </div>
      <div class="row2">
        <div class="opt-input field"><input type="text" id="co-3" placeholder="الخيار 3"><div class="opt-radio" id="cr-3" onclick="setC(3)">✓</div></div>
        <div class="opt-input field"><input type="text" id="co-4" placeholder="الخيار 4"><div class="opt-radio" id="cr-4" onclick="setC(4)">✓</div></div>
      </div>
      <button class="btn" onclick="askCustom()" style="width:100%;background:var(--red);color:#fff">▶ اطرح السؤال</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🎮 التحكم</div>
    <div class="actions" style="margin-bottom:8px">
      <button class="btn" id="auto-btn" onclick="toggleAuto()" style="flex:1;background:#f59e0b;color:#fff;font-size:15px">▶ بدء الأسئلة</button>
    </div>
    <div class="actions">
      <button class="btn" onclick="nextFromBank()" style="flex:1;background:var(--gold);color:#000">⏭ سؤال عشوائي</button>
      <button class="btn" onclick="revealAnswer()" style="flex:1;background:var(--green);color:#fff">🔓 اكشف</button>
      <button class="btn" onclick="stopGame()" style="flex:1;background:var(--red);color:#fff">⏹ إيقاف</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">👥 اللاعبين</div>
    <div id="player-list"><div class="empty">لا يوجد لاعبين</div></div>
  </div>

  <div class="card">
    <div class="card-title">🔗 رابط الـ Overlay</div>
    <div style="display:flex;gap:8px;align-items:center">
      <div class="overlay-link" id="overlay-link" style="flex:1">—</div>
      <button class="btn" onclick="copyLink()" style="background:var(--red);color:#fff;padding:10px 16px;font-size:13px">📋 نسخ</button>
    </div>
  </div>
</div>

    if(!autoMode) return;
    revealAnswer();
    autoTimer=setTimeout(function(){
      if(!autoMode) return;
      loadPlayers().then(function(){
        // Check if game is finished
        var alive=parseInt(document.getElementById('s-alive').textContent)||0;
        if(alive<=1){
          autoMode=false;
          document.getElementById('auto-btn').textContent='▶ بدء الأسئلة';
          document.getElementById('auto-btn').style.background='#f59e0b';
        } else {
          autoNext();
        }
      });
    },3000);
  },answerTime*1000+3000);
}

async function openRegistration(){
  await fetch(_api('/api/knockout/register'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,keyword:document.getElementById('keyword').value.trim(),maxPlayers:parseInt(document.getElementById('max-players').value)||16})});
  document.getElementById('status-badge').textContent='📝 تسجيل';document.getElementById('status-badge').classList.add('active');
  loadPlayers();
}
async function lockRegistration(){
  await fetch(_api('/api/knockout/lock'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username})});
  document.getElementById('status-badge').textContent='🔒 جاهز';loadPlayers();
}
async function askQ(q,opts,correct){
  var at=parseInt(document.getElementById('answer-time').value)||15;
  await fetch(_api('/api/knockout/ask'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,question:q,options:opts,correct:correct,answerTime:at})});
  document.getElementById('status-badge').textContent='❓ سؤال';
}
async function askCustom(){
  var q=document.getElementById('custom-q').value.trim();
  var opts=[document.getElementById('co-1').value.trim(),document.getElementById('co-2').value.trim(),document.getElementById('co-3').value.trim(),document.getElementById('co-4').value.trim()];
  if(!q||opts.some(function(o){return !o;})){alert('أكمل السؤال');return;}
  await askQ(q,opts,correctAnswer);
}
async function nextFromBank(){
  var pool=QS.map(function(q,i){return{...q,idx:i};}).filter(function(q){return !usedQs.has(q.idx);});
  if(!pool.length){usedQs.clear();pool=QS.map(function(q,i){return{...q,idx:i};});}
  var pick=pool[Math.floor(Math.random()*pool.length)];
  usedQs.add(pick.idx);
  await askQ(pick.q,pick.opts,pick.correct);
  renderBank();
}
async function revealAnswer(){await fetch(_api('/api/knockout/reveal'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username})});setTimeout(loadPlayers,1000);}
async function stopGame(){await fetch(_api('/api/knockout/stop'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username})});document.getElementById('status-badge').textContent='متوقف';document.getElementById('status-badge').classList.remove('active');}

async function loadPlayers(){
  var res=await fetch(_api('/api/knockout/'+username));var data=await res.json();
  document.getElementById('s-alive').textContent=data.aliveCount||0;
  document.getElementById('s-round').textContent=data.round||0;
  document.getElementById('s-elim').textContent=(data.eliminated||[]).length;
  document.getElementById('s-total').textContent=data.totalPlayers||0;
  var el=document.getElementById('player-list');
  var list=data.players||[];
  if(!list.length){el.innerHTML='<div class="empty">لا يوجد لاعبين</div>';return;}
  el.innerHTML=list.map(function(p){return '<div class="player-item '+(p.alive?'alive':'dead')+'"><span>'+(p.alive?'✅':'❌')+'</span><span class="player-name">'+esc(p.name)+'</span></div>';}).join('');
}
function renderBank(){
  document.getElementById('q-bank').innerHTML=QS.map(function(q,i){return '<div class="q-item '+(usedQs.has(i)?'used':'')+'" onclick="askFromBank('+i+')"><div class="q-item-text">'+esc(q.q)+'</div><div class="q-item-correct">✓ '+esc(q.opts[q.correct-1])+'</div></div>';}).join('');
}
async function askFromBank(i){usedQs.add(i);await askQ(QS[i].q,QS[i].opts,QS[i].correct);renderBank();}

socket.on('knockout:joined',function(d){loadPlayers();});
socket.on('knockout:reveal',function(d){
  loadPlayers();
  if(d && d.winner){
    autoMode=false;
    document.getElementById('auto-btn').textContent='▶ بدء الأسئلة';
    document.getElementById('auto-btn').style.background='#f59e0b';
    if(autoTimer){clearTimeout(autoTimer);autoTimer=null;}
    document.getElementById('status-badge').textContent='🏆 فائز!';
  }
});
socket.on('knockout:locked',function(){loadPlayers();});
socket.on('knockout:answered',function(d){
  document.getElementById('status-badge').textContent='❓ '+d.count+'/'+d.total+' جاوبوا';
});
renderBank();if(username)loadPlayers();
</script>
</body>
