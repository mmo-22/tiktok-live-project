<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Wheel Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:transparent;font-family:'Tajawal',sans-serif;width:100vw;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center}
.wrap{position:relative;width:520px;height:520px}
canvas{border-radius:50%;display:block}
.ptr{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:34px;color:#f5c542;text-shadow:0 3px 14px rgba(0,0,0,.9);z-index:2;pointer-events:none}

.winner-banner{
  position:fixed;bottom:44px;left:50%;
  transform:translateX(-50%) translateY(30px);
  background:rgba(6,6,11,0.93);
  border:2px solid #f5c542;
  border-radius:22px;padding:18px 30px;
  display:flex;align-items:center;gap:16px;
  opacity:0;transition:all .5s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;min-width:260px;
}
.winner-banner.show{opacity:1;transform:translateX(-50%) translateY(0)}
.winner-banner img,.winner-ph{width:54px;height:54px;border-radius:50%;border:2px solid #f5c542;object-fit:cover;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;background:#0891b2}
.w-info .lbl{font-size:12px;color:#f5c542;font-weight:700;margin-bottom:3px}
.w-info .name{font-size:22px;color:#fff;font-weight:800}

.brand{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,0.15);letter-spacing:1px;pointer-events:none}
</style>
</head>
<body>

<div class="wrap">
  <div class="ptr">▼</div>
  <canvas id="c" width="520" height="520"></canvas>
</div>

<div class="winner-banner" id="banner">
  <div id="bannerAv"></div>
  <div class="w-info">
    <div class="lbl">🏆 الفائز</div>
    <div class="name" id="bannerName"></div>
  </div>
</div>

<div class="brand">bthlab.live</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const username = new URLSearchParams(location.search).get('username')||'';
const COLORS = ['#0891b2','#7c3aed','#dc2626','#d97706','#059669','#0e7490','#6d28d9','#b91c1c','#b45309','#047857','#22d3ee','#a78bfa','#f87171','#fbbf24','#34d399'];

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W=canvas.width, H=canvas.height, CX=W/2, CY=H/2, R=CX-8;

let entries=[], angle=0;

const socket = io({ transports:['websocket','polling'] });
socket.on('connect', () => {
  socket.emit('overlay:join', { username });
  socket.emit('wheel:join', { username });
  socket.emit('wheel:getState', { username });
});
socket.on('reconnect', () => {
  socket.emit('overlay:join', { username });
  socket.emit('wheel:join', { username });
});

socket.on('wheel:state', (s) => {
  if (s.entries) { entries=s.entries; draw(angle); }
  if (s.winner) showBanner(s.winner);
});

socket.on('wheel:updateEntries', (d) => {
  if (d.username !== username) return;
  entries = d.entries||[];
  draw(angle);
});

socket.on('wheel:spin', (d) => {
  if (d.username !== username) return;
  if (d.entries) entries = d.entries;
  hideBanner();
  if (!entries.length) return;
  const winnerIdx = entries.findIndex(e=>e.uniqueId===d.winner?.uniqueId);
  const idx = winnerIdx >= 0 ? winnerIdx : 0;
  const slice = Math.PI*2/entries.length;
  const winnerMid = idx*slice + slice/2;
  const extra = Math.PI*2*(5+Math.random()*3);
  const target = angle + extra + (Math.PI*1.5 - winnerMid - (angle%(Math.PI*2)));
  animateSpin(target, 5000);
});

socket.on('wheel:result', (d) => {
  if (d.username !== username) return;
  if (d.winner) showBanner(d.winner);
});

socket.on('wheel:reset', (d) => {
  if (d && d.username && d.username !== username) return;
  hideBanner(); angle=0; draw(0);
});

socket.on('wheel:clear', (d) => {
  if (d && d.username && d.username !== username) return;
  entries=[]; draw(angle);
});

// Draw
function draw(a) {
  ctx.clearRect(0,0,W,H);
  if (!entries.length) {
    ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2);
    ctx.fillStyle='rgba(13,13,20,0.5)'; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=2; ctx.stroke();
    return;
  }
  const slice=Math.PI*2/entries.length;
  entries.forEach((e,i)=>{
    const s=a+i*slice,en=s+slice;
    ctx.beginPath(); ctx.moveTo(CX,CY); ctx.arc(CX,CY,R,s,en); ctx.closePath();
    ctx.fillStyle=COLORS[i%COLORS.length]; ctx.fill();
    ctx.strokeStyle='#06060b'; ctx.lineWidth=2; ctx.stroke();
    ctx.save(); ctx.translate(CX,CY); ctx.rotate(s+slice/2);
    ctx.textAlign='right'; ctx.fillStyle='#fff';
    const fs=entries.length>20?10:entries.length>10?12:15;
    ctx.font=`bold ${fs}px Tajawal`;
    ctx.shadowColor='rgba(0,0,0,0.5)'; ctx.shadowBlur=4;
    ctx.fillText((e.nickname||e.uniqueId||'').substring(0,14),R-12,6);
    ctx.restore();
  });
  ctx.beginPath(); ctx.arc(CX,CY,18,0,Math.PI*2);
  ctx.fillStyle='#06060b'; ctx.fill();
  ctx.strokeStyle='#22d3ee'; ctx.lineWidth=3; ctx.stroke();
}

// Animate
function animateSpin(target, duration) {
  const start=performance.now(), startA=angle;
  function step(now){
    const p=Math.min((now-start)/duration,1);
    const ease=1-Math.pow(1-p,3);
    angle=startA+(target-startA)*ease;
    draw(angle);
    if(p<1) requestAnimationFrame(step);
    else { angle=target; draw(angle); }
  }
  requestAnimationFrame(step);
}

// Winner banner
function showBanner(w) {
  const av = w.profilePicture
    ? `<img src="${w.profilePicture}" onerror="this.style.display='none'">`
    : `<div class="winner-ph">${(w.nickname||'?')[0].toUpperCase()}</div>`;
  document.getElementById('bannerAv').innerHTML = av;
  document.getElementById('bannerName').textContent = w.nickname||w.uniqueId||'';
  document.getElementById('banner').classList.add('show');
}
function hideBanner() {
  document.getElementById('banner').classList.remove('show');
}

draw(0);
</script>
</body>
</html>
