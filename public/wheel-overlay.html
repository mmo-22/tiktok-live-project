<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="rgba(0,0,0,0)">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wheel Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
/* 🔬 مؤشر تشخيص - يظهر حالة الاتصال في زاوية الشاشة */
#bthlab-diag {
  position: fixed !important;
  top: 8px !important;
  right: 8px !important;
  z-index: 999999 !important;
  background: rgba(0,0,0,.85) !important;
  color: #fff !important;
  padding: 6px 12px !important;
  border-radius: 20px !important;
  font-family: Arial, sans-serif !important;
  font-size: 11px !important;
  font-weight: 700 !important;
  border: 1.5px solid #fbbf24 !important;
  pointer-events: none !important;
  transition: opacity .4s !important;
}
#bthlab-diag.ok { border-color: #10b981 !important; }
#bthlab-diag.err { border-color: #ef4444 !important; }
/* 🔥 حل قطعي لشاشة سوداء في TikTok LIVE Studio - شفافية مضمونة */
html, body { background: transparent !important; background-color: rgba(0,0,0,0) !important; }
:root { color-scheme: light dark; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    background:transparent;
    width:100vw; height:100vh;
    display:flex; align-items:center; justify-content:center;
    font-family:'Tajawal',sans-serif; overflow:hidden;
  }

  .wheel-wrap {
    position:relative; display:flex;
    flex-direction:column; align-items:center; gap:16px;
  }

  /* Pointer */
  .pointer {
    position:absolute; top:-20px; left:50%; transform:translateX(-50%);
    width:0; height:0;
    border-left:16px solid transparent;
    border-right:16px solid transparent;
    border-top:36px solid #ffd700;
    z-index:10;
  }

  canvas { border-radius:50%; }

  /* Winner popup */
  #winner-popup {
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    z-index:100; opacity:0; pointer-events:none;
    transition:opacity .5s;
    background:transparent;
  }
  #winner-popup.show { opacity:1; }
  .winner-card {
    background:rgba(0,0,0,.9); border:3px solid #ffd700;
    border-radius:28px; padding:36px 52px; text-align:center;
    box-shadow: none;
    animation:popIn .5s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes popIn { from{transform:scale(0) rotate(-10deg)} to{transform:scale(1) rotate(0)} }
  .winner-avatar-wrap { margin-bottom:14px; }
  .winner-avatar { width:90px; height:90px; border-radius:50%; border:4px solid #ffd700; object-fit:cover; }
  .winner-avatar-placeholder {
    width:90px; height:90px; border-radius:50%; border:4px solid #ffd700;
    background:#1a1a24; display:flex; align-items:center; justify-content:center;
    font-size:36px; font-weight:900; color:#ffd700; margin:0 auto;
  }
  .winner-label { font-size:16px; color:#aaa; margin-bottom:8px; }
  .winner-name  { font-size:32px; font-weight:900; color:#ffd700; }

  /* Confetti */
  .confetti-piece {
    position:fixed; width:10px; height:10px; border-radius:2px;
    animation:confettiFall linear forwards;
    pointer-events:none; z-index:200;
  }
  @keyframes confettiFall {
    0%   { transform:translateY(-20px) rotate(0deg); opacity:1; }
    100% { transform:translateY(105vh) rotate(720deg); opacity:0; }
  }

  /* Waiting state */
  #waiting {
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    color:rgba(255,255,255,.3); font-size:18px;
  }
</style>
<script>
// 🔥 فرض شفافية HTML/body في TikTok LIVE Studio WebView
(function(){
  var setTransparent = function(){
    document.documentElement.style.background = 'transparent';
    document.documentElement.style.backgroundColor = 'rgba(0,0,0,0)';
    if(document.body){
      document.body.style.background = 'transparent';
      document.body.style.backgroundColor = 'rgba(0,0,0,0)';
    }
  };
  setTransparent();
  document.addEventListener('DOMContentLoaded', setTransparent);
  window.addEventListener('load', setTransparent);
})();
</script>
</head>
<body>
<div id="bthlab-diag">🟡 يتصل...</div>

<div id="waiting">في انتظار الدوران...</div>

<div id="reg-banner" style="display:none;position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.9);border:2px solid #ffd700;border-radius:16px;padding:14px 24px;color:#fff;font-size:20px;font-weight:900;text-align:center;min-width:280px">
  <div style="font-size:14px;color:#ffd700;margin-bottom:6px">📝 التسجيل مفتوح</div>
  <div><span id="reg-count" style="color:#25f4ee;font-size:24px">0</span> مشارك</div>
  <div id="reg-timer" style="display:none;font-size:28px;color:#ffd700;margin-top:6px">00:00</div>
  <div id="reg-keyword" style="font-size:13px;color:#aaa;margin-top:4px">اكتب <strong style="color:#fff" id="reg-kw-text">اشتراك</strong> للمشاركة</div>
</div>

<div class="wheel-wrap" id="wheel-wrap" style="display:none">
  <div class="pointer"></div>
  <canvas id="wheel-canvas" width="500" height="500"></canvas>
</div>

<div id="winner-popup">
  <div class="winner-card">
    <div class="winner-avatar-wrap" id="winner-av"></div>
    <div class="winner-name" id="winner-name"></div>
  </div>
</div>

<script>
const params   = new URLSearchParams(location.search);
const username = params.get('username') || '';
const __auth=(function(){var p=new URLSearchParams(location.search);return{key:p.get('key')||'',pw:p.get('pw')||''};})();
const socket = io({auth:__auth,transports:['websocket','polling'],upgrade:true,reconnection:true,reconnectionDelay:500,reconnectionDelayMax:3000,reconnectionAttempts:Infinity,timeout:10000,withCredentials:false});
// auto-rejoin: ضمان عودة الانضمام للقناة بعد كل اتصال/إعادة اتصال
socket.on('connect',function(){try{if(typeof username!=='undefined'&&username)socket.emit('join', { username: username, key: __auth.key, pw: __auth.pw });}catch(e){}});
socket.io.on('reconnect',function(){try{if(typeof username!=='undefined'&&username)socket.emit('join', { username: username, key: __auth.key, pw: __auth.pw });}catch(e){}});

const canvas   = document.getElementById('wheel-canvas');
const ctx      = canvas.getContext('2d');

const COLORS = [
  '#ff0050','#25f4ee','#ffd700','#1dba72','#a57afa',
  '#f59e0b','#3b82f6','#ec4899','#10b981','#f97316',
];

let entries     = [];
let currentAngle = 0;
let spinning     = false;
let regTimer     = null;
let regEndTime   = 0;
let accepting    = false;

if (username) socket.emit('join', { username: username, key: __auth.key, pw: __auth.pw });

// Load initial state
fetch(_api(`/api/wheel/${username}`)).then(r => r.json()).then(data => {
  if (data.accepting) {
    accepting = true;
    regEndTime = data.regEndTime || 0;
    showRegBanner(data.keyword || 'اشتراك', data.count || 0);
  }
});

// Receive entries updates (لحظي)
socket.on('wheel:update', ({ entries: e }) => {
  entries = e || [];
  document.getElementById('reg-count').textContent = entries.length;
  if (entries.length > 0) {
    document.getElementById('waiting').style.display = 'none';
    document.getElementById('wheel-wrap').style.display = 'flex';
    drawWheel(currentAngle);
  } else {
    document.getElementById('waiting').style.display = 'flex';
    document.getElementById('wheel-wrap').style.display = 'none';
  }
});

socket.on('wheel:registration', ({ accepting: a, endTime, keyword, count }) => {
  accepting = a;
  regEndTime = endTime || 0;
  if (a) {
    showRegBanner(keyword || 'اشتراك', count || entries.length || 0);
  } else {
    hideRegBanner();
  }
});

function showRegBanner(keyword, count) {
  document.getElementById('reg-banner').style.display = 'block';
  document.getElementById('reg-kw-text').textContent = keyword;
  document.getElementById('reg-count').textContent = count;
  if (regEndTime > 0) {
    document.getElementById('reg-timer').style.display = 'block';
    startRegTimer();
  } else {
    document.getElementById('reg-timer').style.display = 'none';
  }
}

function hideRegBanner() {
  document.getElementById('reg-banner').style.display = 'none';
  if (regTimer) { clearInterval(regTimer); regTimer = null; }
}

function startRegTimer() {
  if (regTimer) clearInterval(regTimer);
  updateRegTimer();
  regTimer = setInterval(updateRegTimer, 200);
}

function updateRegTimer() {
  const remainMs = Math.max(0, regEndTime - Date.now());
  const sec = Math.ceil(remainMs / 1000);
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  const el = document.getElementById('reg-timer');
  el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.style.color = sec <= 10 ? '#ff0050' : '#ffd700';
  if (remainMs <= 0) {
    clearInterval(regTimer);
    regTimer = null;
  }
}

// Receive spin command
socket.on('wheel:spin', ({ winner, winnerIndex, duration, speed, entries: e }) => {
  entries = e || entries;
  document.getElementById('waiting').style.display = 'none';
  document.getElementById('wheel-wrap').style.display = 'flex';
  doSpin(winner, winnerIndex, duration || 5000, speed || 'normal');
});

function doSpin(winner, winnerIndex, duration, speed) {
  if (spinning) return;
  spinning = true;

  const spinsPerSecond = speed === 'fast' ? 3 : speed === 'slow' ? 0.8 : 1.5;
  const totalSeconds   = duration / 1000;
  const numFullSpins   = Math.floor(spinsPerSecond * totalSeconds);

  const slice = (Math.PI * 2) / entries.length;

  // الزاوية النهائية المطلوبة بحيث منتصف قطعة الفائز تحت السهم (-π/2)
  const wantedFinal = -Math.PI / 2 - winnerIndex * slice - slice / 2;

  // ابدأ من الزاوية الحالية واضف عدد دورات كاملة + اذهب للزاوية المطلوبة
  const startAngle = currentAngle;
  // finalAngle = wantedFinal + n*2π حيث n كافي لـ extraSpins
  const finalAngle = wantedFinal + Math.ceil((startAngle - wantedFinal) / (Math.PI * 2) + numFullSpins) * Math.PI * 2;

  const totalAngle = finalAngle - startAngle;

  const startTime = performance.now();
  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

  function animate(now) {
    const elapsed  = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    currentAngle   = startAngle + totalAngle * easeOut(progress);
    drawWheel(currentAngle);
    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      currentAngle = finalAngle; // ضمان الدقة في النهاية
      drawWheel(currentAngle);
      spinning = false;
      const ptrRelative = ((-Math.PI / 2) - currentAngle % (Math.PI * 2) + Math.PI * 4) % (Math.PI * 2);
      const actualIdx = Math.floor(ptrRelative / slice) % entries.length;
      console.log(`[Wheel] Expected: ${winner.name} (${winnerIndex}), Actual: ${entries[actualIdx]?.name} (${actualIdx})`);
      showWinner(winner);
    }
  }

  requestAnimationFrame(animate);
}

// Load existing entries
if (username) {
  fetch(_api(`/api/wheel/${username}`)).then(r => r.json()).then(data => {
    entries = data.entries || [];
    if (entries.length > 0) {
      document.getElementById('waiting').style.display = 'none';
      document.getElementById('wheel-wrap').style.display = 'flex';
      drawWheel(currentAngle);
    }
  });
}

// ── Draw ──────────────────────────────────────────────────
function drawWheel(angle) {
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const r  = cx - 8;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!entries.length) return;

  const slice = (Math.PI * 2) / entries.length;

  entries.forEach((entry, i) => {
    const start = angle + i * slice;
    const end   = start + slice;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = COLORS[i % COLORS.length];
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.25)';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + slice / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${entries.length > 20 ? 13 : entries.length > 10 ? 15 : 17}px Tajawal`;
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    const name = entry.name.length > 12 ? entry.name.slice(0,12)+'…' : entry.name;
    ctx.fillText(name, r - 14, 5);
    ctx.restore();
  });

  // Center
  ctx.beginPath();
  ctx.arc(cx, cy, 30, 0, Math.PI * 2);
  ctx.fillStyle = '#ffd700';
  ctx.fill();
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 3;
  ctx.stroke();
}

// ── Spin ──────────────────────────────────────────────────

function showWinner(winner) {
  const av = document.getElementById('winner-av');
  if (winner.avatar) {
    av.innerHTML = `<img class="winner-avatar" src="${winner.avatar}" onerror="this.outerHTML='<div class=winner-avatar-placeholder>${winner.name[0]}</div>'">`;
  } else {
    av.innerHTML = `<div class="winner-avatar-placeholder">${winner.name[0]}</div>`;
  }
  document.getElementById('winner-name').textContent = winner.name;
  document.getElementById('winner-popup').classList.add('show');
  launchConfetti();
  setTimeout(() => document.getElementById('winner-popup').classList.remove('show'), 6000);
}

function launchConfetti() {
  const colors = ['#ff0050','#25f4ee','#ffd700','#1dba72','#a57afa','#f59e0b'];
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left:${Math.random()*100}vw;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${2+Math.random()*2}s;
      animation-delay:${Math.random()*0.5}s;
      transform:rotate(${Math.random()*360}deg);
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

drawWheel(currentAngle);
</script>
<script>
// 🔬 مؤشر تشخيص للأوفرلاي - يعرض حالة الاتصال
(function(){
  var el = document.getElementById('bthlab-diag');
  if (!el) return;
  var joinedRoom = false;
  var checkInterval = setInterval(function(){
    if (typeof socket === 'undefined') return;
    clearInterval(checkInterval);
    
    var qs = new URLSearchParams(location.search);
    var u = qs.get('username') || qs.get('user') || '';
    var hasKey = !!(qs.get('key') || qs.get('pw'));
    
    if (!u) {
      el.className = 'err';
      el.textContent = '❌ URL ناقص username';
      return;
    }
    if (!hasKey) {
      el.className = 'err';
      el.textContent = '⚠️ URL ناقص key';
      return;
    }
    
    function update() {
      if (socket.connected) {
        el.className = 'ok';
        el.textContent = joinedRoom ? ('🟢 متصل · @' + u) : ('🟡 انضمام...');
        if (joinedRoom) {
          setTimeout(function(){ el.style.opacity = '0'; setTimeout(function(){ el.style.display = 'none'; }, 400); }, 8000);
        }
      } else {
        el.className = '';
        el.textContent = '🟡 يتصل بالسيرفر...';
        el.style.opacity = '1';
        el.style.display = 'block';
      }
    }
    
    socket.on('connect', update);
    socket.on('disconnect', function(){
      el.className = 'err';
      el.textContent = '🔴 انقطع الاتصال';
      el.style.opacity = '1';
      el.style.display = 'block';
    });
    socket.on('connect_error', function(err){
      el.className = 'err';
      el.textContent = '❌ فشل: ' + (err.message||'').slice(0,25);
      el.style.opacity = '1';
      el.style.display = 'block';
    });
    // نعرف إن انضممنا للقناة لما يوصل أي event من السيرفر
    var origOn = socket.on.bind(socket);
    ['stats','room:status','wheel:update','knockout:register','knockout:question','password:update','quiz:start','poll:start','word-war:update','guess:update','history','viewers'].forEach(function(evt){
      socket.on(evt, function(){ if (!joinedRoom) { joinedRoom = true; update(); } });
    });
    update();
  }, 50);
})();
</script>
</body>
</html>
