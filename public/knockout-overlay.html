<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="rgba(0,0,0,0)">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knockout Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
/* 🔬 مؤشر تشخيص - يظهر حالة الاتصال في زاوية الشاشة */
#bthlab-diag {
  position: fixed !important;
  top: 8px !important;
  right: 8px !important;
  z-index: 999999 !important;
  background: rgba(0,0,0,.85) !important;
  color: #fff !important;
  padding: 6px 12px !important;
  border-radius: 20px !important;
  font-family: Arial, sans-serif !important;
  font-size: 11px !important;
  font-weight: 700 !important;
  border: 1.5px solid #fbbf24 !important;
  pointer-events: none !important;
  transition: opacity .4s !important;
}
#bthlab-diag.ok { border-color: #10b981 !important; }
#bthlab-diag.err { border-color: #ef4444 !important; }
/* 🔥 حل قطعي لشاشة سوداء في TikTok LIVE Studio - شفافية مضمونة */
html, body { background: transparent !important; background-color: rgba(0,0,0,0) !important; }
:root { color-scheme: light dark; }
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:transparent;width:100vw;height:100vh;font-family:'Tajawal',sans-serif;overflow:hidden;display:flex;align-items:center;justify-content:center}
.main{position:relative;background:rgba(0,0,0,.92);border:2px solid rgba(239,68,68,.4);border-radius:22px;padding:24px 28px;min-width:520px;max-width:680px;opacity:0;transition:opacity .15s;overflow:hidden}
.main.show{opacity:1}
.main::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#ef4444,#ffd700,#ef4444)}

.title{font-size:18px;color:rgba(255,255,255,.5);text-align:center;margin-bottom:10px}
.title span{color:#ef4444;font-weight:900}

.phase-label{text-align:center;font-size:15px;color:#fbbf24;font-weight:700;margin-bottom:12px}

.stats-row{display:flex;justify-content:center;gap:24px;margin-bottom:14px}
.stat{text-align:center}
.stat-num{font-size:24px;font-weight:900;color:#fff}
.stat-label{font-size:11px;color:rgba(255,255,255,.4)}

.q-box{background:rgba(239,68,68,.06);border:1.5px solid rgba(239,68,68,.2);border-radius:16px;padding:18px;text-align:center;margin-bottom:14px}
.q-text{font-size:20px;font-weight:900;color:#fff;line-height:1.5}

.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.opt{padding:12px 14px;border-radius:12px;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:8px;transition:all .3s}
.opt .n{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:rgba(255,255,255,.5);flex-shrink:0}
.opt .t{font-size:14px;font-weight:700;color:rgba(255,255,255,.7)}
.opt.correct{background:rgba(29,186,114,.15);border-color:#1dba72}.opt.correct .n{background:#1dba72;color:#fff}.opt.correct .t{color:#1dba72}
.opt.wrong{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3)}.opt.wrong .t{color:rgba(239,68,68,.7)}

.timer-bar{height:5px;background:rgba(255,255,255,.06);border-radius:3px;margin-bottom:12px;overflow:hidden}
.timer-fill{height:100%;background:linear-gradient(90deg,#ef4444,#fbbf24);border-radius:3px;transition:width .15s linear}

.answer-status{text-align:center;font-size:13px;color:rgba(255,255,255,.3);margin-bottom:10px}

.players-alive{display:flex;flex-direction:column;align-items:center;gap:4px;margin-bottom:10px}
.progress-wrap{width:90%;height:10px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#1dba72,#25f4ee);border-radius:99px;transition:width .5s ease}
.progress-fill.low{background:linear-gradient(90deg,#f59e0b,#ef4444)}
.progress-text{font-size:12px;color:rgba(255,255,255,.4);font-weight:700}

.elim-feed{display:flex;flex-wrap:nowrap;justify-content:center;gap:4px;margin-bottom:10px;overflow:hidden;max-height:34px}
.elim-avatar{width:30px;height:30px;border-radius:50%;border:2px solid #ef4444;overflow:hidden;animation:elimPop .3s ease;opacity:.6}
.elim-avatar img{width:100%;height:100%;object-fit:cover;filter:grayscale(.5)}
@keyframes elimPop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:.6}}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

.reg-banner{text-align:center;padding:16px}
.reg-title{font-size:16px;font-weight:900;color:#fbbf24;margin-bottom:4px}
.reg-keyword{font-size:22px;font-weight:900;color:#fff}
.reg-count{font-size:14px;color:rgba(255,255,255,.5);margin-top:6px}
.reg-slots{display:flex;flex-wrap:wrap;justify-content:center;gap:4px;margin-top:10px}
.reg-slot{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(255,255,255,.2);overflow:hidden;transition:all .3s}
.reg-slot.filled{background:rgba(29,186,114,.15);border-color:#1dba72;color:#1dba72}

.winner-box{text-align:center;padding:20px;display:none}
.winner-box.show{display:block;animation:winPop .5s cubic-bezier(0.34,1.56,0.64,1)}
.winner-icon{font-size:52px;margin-bottom:8px}
.winner-name{font-size:28px;font-weight:900;color:#ffd700}
.winner-sub{font-size:14px;color:rgba(255,255,255,.4);margin-top:4px}
@keyframes winPop{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}

.confetti-layer{position:absolute;inset:0;pointer-events:none;overflow:hidden}
</style>
<script>
// 🔥 فرض شفافية HTML/body في TikTok LIVE Studio WebView
(function(){
  var setTransparent = function(){
    document.documentElement.style.background = 'transparent';
    document.documentElement.style.backgroundColor = 'rgba(0,0,0,0)';
    if(document.body){
      document.body.style.background = 'transparent';
      document.body.style.backgroundColor = 'rgba(0,0,0,0)';
    }
  };
  setTransparent();
  document.addEventListener('DOMContentLoaded', setTransparent);
  window.addEventListener('load', setTransparent);
})();
</script>
</head>
<body>
<div id="bthlab-diag">🟡 يتصل...</div>
<div class="main" id="box">
  <div class="title">🏆 <span>بطولة خروج</span></div>
  <div class="phase-label" id="phase-label"></div>
  <div class="stats-row" id="stats-row" style="display:none">
    <div class="stat"><div class="stat-num" id="alive-num">0</div><div class="stat-label">باقي</div></div>
    <div class="stat"><div class="stat-num" id="round-num">0</div><div class="stat-label">الجولة</div></div>
    <div class="stat"><div class="stat-num" id="elim-num">0</div><div class="stat-label">طلعوا</div></div>
  </div>
  <div class="reg-banner" id="reg-banner" style="display:none">
    <div class="reg-title">اكتب في الشات عشان تشارك</div>
    <div class="reg-keyword" id="reg-keyword">بطولة</div>
    <div class="reg-count" id="reg-count">0 / 16</div>
    <div class="reg-slots" id="reg-slots"></div>
  </div>
  <div class="q-box" id="q-box" style="display:none"><div class="q-text" id="q-text"></div></div>
  <div class="opts-grid" id="opts-grid"></div>
  <div class="timer-bar" id="timer-bar" style="display:none"><div class="timer-fill" id="timer-fill"></div></div>
  <div class="answer-status" id="answer-status" style="display:none"></div>
  <div class="players-alive" id="players-alive">
    <div class="progress-wrap"><div class="progress-fill" id="progress-fill" style="width:100%"></div></div>
    <div class="progress-text" id="progress-text">0 / 0 باقي</div>
  </div>
  <div class="elim-feed" id="elim-feed"></div>
  <div class="winner-box" id="winner-box"><div class="winner-icon">🏆</div><div class="winner-name" id="winner-name"></div><div class="winner-sub">بطل البطولة!</div></div>
  <div class="confetti-layer" id="confetti-layer"></div>
</div>
<script>
var params=new URLSearchParams(location.search),username=params.get('username')||'';
var __auth={key:params.get('key')||'',pw:params.get('pw')||''};
var socket=io({auth:__auth,transports:['websocket','polling'],upgrade:true,reconnection:true,reconnectionDelay:500,reconnectionDelayMax:3000,reconnectionAttempts:Infinity,timeout:10000,withCredentials:false});
if(username)socket.emit('join',{username:username,key:__auth.key,pw:__auth.pw});
// auto-rejoin: ضمان عودة الانضمام للقناة بعد كل اتصال/إعادة اتصال
socket.on('connect',function(){try{if(username)socket.emit('join',{username:username,key:__auth.key,pw:__auth.pw});}catch(e){}});
socket.io.on('reconnect',function(){try{if(username)socket.emit('join',{username:username,key:__auth.key,pw:__auth.pw});}catch(e){}});
var timerInt=null,COLORS=['#ef4444','#fbbf24','#1dba72','#3b82f6','#a855f7','#ec4899'];
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

socket.on('knockout:register',function(d){
  show();
  // Hide everything from previous round
  if(timerInt){clearInterval(timerInt);timerInt=null;}
  document.getElementById('timer-bar').style.display='none';
  document.getElementById('answer-status').style.display='none';
  document.getElementById('q-box').style.display='none';
  document.getElementById('opts-grid').innerHTML='';
  document.getElementById('winner-box').classList.remove('show');
  document.getElementById('winner-box').style.display='none';
  document.getElementById('stats-row').style.display='none';
  document.getElementById('elim-feed').innerHTML='';
  // Show registration
  document.getElementById('reg-banner').style.display='block';
  document.getElementById('reg-keyword').textContent=d.keyword;
  document.getElementById('reg-count').textContent='0 / '+d.maxPlayers;
  document.getElementById('phase-label').textContent='📝 مرحلة التسجيل';
  // Reset progress bar
  var fill=document.getElementById('progress-fill');
  if(fill){fill.style.width='100%';fill.classList.remove('low');}
  document.getElementById('progress-text').textContent='';
  totalRegistered=0;
  // Render slots
  var slots='';for(var i=0;i<d.maxPlayers;i++)slots+='<div class="reg-slot">?</div>';
  document.getElementById('reg-slots').innerHTML=slots;
});

socket.on('knockout:joined',function(d){
  document.getElementById('reg-count').textContent=d.count+' / '+d.max;
  var slots=document.getElementById('reg-slots').children;
  if(slots[d.count-1]){
    slots[d.count-1].classList.add('filled');
    if(d.avatar){
      slots[d.count-1].innerHTML='<img src="'+d.avatar+'" style="width:100%;height:100%;border-radius:50%;object-fit:cover" onerror="this.parentElement.textContent=\'✓\'">';
    } else {
      slots[d.count-1].textContent='✓';
    }
  }
});

socket.on('knockout:locked',function(d){
  document.getElementById('reg-banner').style.display='none';
  document.getElementById('phase-label').textContent='🔒 التسجيل مقفل — '+d.count+' لاعب';
  document.getElementById('stats-row').style.display='flex';
  document.getElementById('alive-num').textContent=d.count;
  document.getElementById('round-num').textContent='0';
  document.getElementById('elim-num').textContent='0';
  totalRegistered=d.count;
  renderAlive(d.count, d.count);
});

socket.on('knockout:question',function(d){
  document.getElementById('reg-banner').style.display='none';
  document.getElementById('stats-row').style.display='flex';
  document.getElementById('q-box').style.display='block';
  document.getElementById('q-text').textContent=d.question;
  document.getElementById('phase-label').textContent='❓ الجولة '+d.round+' — جاوب الحين!';
  document.getElementById('round-num').textContent=d.round;
  document.getElementById('alive-num').textContent=d.alivePlayers;
  document.getElementById('answer-status').style.display='block';
  document.getElementById('answer-status').textContent='0 / '+d.alivePlayers+' جاوبوا';
  // Clear previous answer highlights
  document.getElementById('opts-grid').innerHTML=d.options.map(function(o,i){
    return'<div class="opt" id="ko-opt-'+(i+1)+'"><span class="n">'+(i+1)+'</span><span class="t">'+esc(o)+'</span></div>';
  }).join('');
  // Timer
  document.getElementById('timer-bar').style.display='block';
  var fill=document.getElementById('timer-fill'),total=d.answerTime*1000,start=Date.now();
  fill.style.width='100%';
  if(timerInt)clearInterval(timerInt);
  timerInt=setInterval(function(){var p=Math.max(0,100-(Date.now()-start)/total*100);fill.style.width=p+'%';if(p<=0){clearInterval(timerInt);timerInt=null;}},50);
  show();
});

socket.on('knockout:answered',function(d){
  document.getElementById('answer-status').textContent=d.count+' / '+d.total+' جاوبوا';
});

socket.on('knockout:reveal',function(d){
  if(timerInt){clearInterval(timerInt);timerInt=null;}
  document.getElementById('timer-bar').style.display='none';
  document.getElementById('answer-status').style.display='none';
  // Highlight correct
  for(var i=1;i<=4;i++){var el=document.getElementById('ko-opt-'+i);if(!el)continue;if(i===d.correct)el.classList.add('correct');else el.classList.add('wrong');}
  // Show eliminated
  document.getElementById('alive-num').textContent=d.aliveCount;
  document.getElementById('elim-num').textContent=(parseInt(document.getElementById('elim-num').textContent)||0)+d.eliminated.length;
  d.eliminated.forEach(function(p){
    var el=document.getElementById('elim-feed');
    var div=document.createElement('div');
    div.className='elim-avatar';
    if(p.avatar){
      div.innerHTML='<img src="'+p.avatar+'" onerror="this.parentElement.textContent=\'❌\'">';
    } else {
      div.style.cssText='display:flex;align-items:center;justify-content:center;background:rgba(239,68,68,.2);font-size:12px;color:#ef4444';
      div.textContent='❌';
    }
    el.appendChild(div);
    // Keep only last 8 visible in single row
    while(el.children.length>8)el.removeChild(el.firstChild);
  });
  document.getElementById('phase-label').textContent='📊 النتائج — '+d.aliveCount+' باقي';
  renderAlive(d.aliveCount, totalRegistered);
  // Winner
  if(d.winner){
    document.getElementById('winner-name').textContent=d.winner.name;
    document.getElementById('winner-box').style.display='block';
    document.getElementById('winner-box').classList.add('show');
    document.getElementById('phase-label').textContent='🏆 البطل!';
    fireConfetti();
  }
});

socket.on('knockout:stopped',function(){document.getElementById('box').classList.remove('show');if(timerInt)clearInterval(timerInt);});

function renderAlive(aliveCount, totalCount){
  var pct = totalCount > 0 ? (aliveCount / totalCount * 100) : 100;
  var fill = document.getElementById('progress-fill');
  fill.style.width = pct + '%';
  fill.classList.toggle('low', pct <= 25);
  document.getElementById('progress-text').textContent = aliveCount + ' / ' + totalCount + ' باقي';
}
var totalRegistered = 0;
function show(){document.getElementById('box').classList.add('show');}
function fireConfetti(){var layer=document.getElementById('confetti-layer'),box=document.getElementById('box'),cx=box.offsetWidth/2,cy=box.offsetHeight/2;for(var i=0;i<40;i++){var p=document.createElement('div');p.style.cssText='position:absolute;width:8px;height:12px;left:'+cx+'px;top:'+cy+'px;background:'+COLORS[i%COLORS.length]+';border-radius:2px;';layer.appendChild(p);var a=Math.random()*Math.PI*2,d=100+Math.random()*220;p.animate([{transform:'translate(0,0) rotate(0deg)',opacity:1},{transform:'translate('+Math.cos(a)*d+'px,'+Math.sin(a)*d+'px) rotate('+(720+Math.random()*720)+'deg)',opacity:0}],{duration:1500+Math.random()*500,easing:'cubic-bezier(0.4,0,0.6,1)'});setTimeout(function(el){el.remove()}.bind(null,p),2100);}}
</script>
<script>
// 🔬 مؤشر تشخيص للأوفرلاي - يعرض حالة الاتصال
(function(){
  var el = document.getElementById('bthlab-diag');
  if (!el) return;
  var joinedRoom = false;
  var checkInterval = setInterval(function(){
    if (typeof socket === 'undefined') return;
    clearInterval(checkInterval);
    
    var qs = new URLSearchParams(location.search);
    var u = qs.get('username') || qs.get('user') || '';
    var hasKey = !!(qs.get('key') || qs.get('pw'));
    
    if (!u) {
      el.className = 'err';
      el.textContent = '❌ URL ناقص username';
      return;
    }
    if (!hasKey) {
      el.className = 'err';
      el.textContent = '⚠️ URL ناقص key';
      return;
    }
    
    function update() {
      if (socket.connected) {
        el.className = 'ok';
        el.textContent = joinedRoom ? ('🟢 متصل · @' + u) : ('🟡 انضمام...');
        if (joinedRoom) {
          setTimeout(function(){ el.style.opacity = '0'; setTimeout(function(){ el.style.display = 'none'; }, 400); }, 8000);
        }
      } else {
        el.className = '';
        el.textContent = '🟡 يتصل بالسيرفر...';
        el.style.opacity = '1';
        el.style.display = 'block';
      }
    }
    
    socket.on('connect', update);
    socket.on('disconnect', function(){
      el.className = 'err';
      el.textContent = '🔴 انقطع الاتصال';
      el.style.opacity = '1';
      el.style.display = 'block';
    });
    socket.on('connect_error', function(err){
      el.className = 'err';
      el.textContent = '❌ فشل: ' + (err.message||'').slice(0,25);
      el.style.opacity = '1';
      el.style.display = 'block';
    });
    // نعرف إن انضممنا للقناة لما يوصل أي event من السيرفر
    var origOn = socket.on.bind(socket);
    ['stats','room:status','wheel:update','knockout:register','knockout:question','password:update','quiz:start','poll:start','word-war:update','guess:update','history','viewers'].forEach(function(evt){
      socket.on(evt, function(){ if (!joinedRoom) { joinedRoom = true; update(); } });
    });
    update();
  }, 50);
})();
</script>
</body>
</html>
