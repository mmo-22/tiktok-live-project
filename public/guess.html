<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💡 خمّن الكلمة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0a0a0f; --surface:#111118; --surface2:#1a1a24;
  --border:rgba(255,255,255,0.08); --accent:#ff0050;
  --accent2:#0891b2; --text:#f0f0f5; --muted:#666;
  --green:#1dba72; --amber:#f59e0b;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Tajawal',sans-serif; min-height:100vh; }
header {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:14px 20px; display:flex; align-items:center; justify-content:space-between;
}
.logo { font-size:18px; font-weight:700; }
.logo span { color:#ffd700; }
.status-badge { font-size:12px; padding:4px 12px; border-radius:20px; font-weight:700; background:rgba(102,102,102,.2); color:var(--muted); transition:all .3s; }
.status-badge.active { background:rgba(29,186,114,.15); color:var(--green); }

.container { max-width:700px; margin:0 auto; padding:20px 16px; display:flex; flex-direction:column; gap:14px; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:18px 20px; }
.card-title { font-size:12px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:var(--muted); margin-bottom:14px; }

/* Category tabs */
.cats { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
.cat {
  padding:5px 12px; border-radius:20px; font-size:13px; cursor:pointer;
  background:var(--surface2); border:1px solid var(--border); color:var(--muted);
  transition:all .15s;
}
.cat.active { background:rgba(255,215,0,.1); border-color:rgba(255,215,0,.4); color:#ffd700; }

/* Word display */
.word-preview {
  display:flex; justify-content:center; gap:8px; flex-wrap:wrap;
  margin:16px 0; direction:rtl;
}
.letter-box {
  width:48px; height:56px; border:2px dashed rgba(255,255,255,.2);
  border-radius:10px; display:flex; align-items:center; justify-content:center;
  font-size:22px; font-weight:900; color:var(--accent2);
  background:var(--surface2);
}
.letter-box.hidden { color:transparent; }

.hint-text { text-align:center; font-size:14px; color:var(--amber); margin-bottom:12px; }

/* Buttons */
.actions { display:flex; gap:8px; }
.btn { flex:1; border:none; font-family:inherit; font-size:14px; font-weight:700; padding:11px; border-radius:10px; cursor:pointer; transition:all .15s; }
.btn-random { background:linear-gradient(135deg,#ffd700,#f59e0b); color:#000; }
.btn-start  { background:var(--green); color:#fff; }
.btn-stop   { background:var(--accent); color:#fff; }
.btn:hover  { opacity:.85; }
.btn:disabled { opacity:.4; cursor:not-allowed; }

/* Custom word */
.custom-row { display:flex; gap:8px; margin-top:10px; }
input {
  flex:1; background:var(--surface2); border:1px solid var(--border);
  color:var(--text); font-family:inherit; font-size:14px;
  padding:9px 12px; border-radius:10px; outline:none; transition:border-color .2s;
}
input:focus { border-color:var(--accent2); }

/* Winner */
.winner-banner {
  background:rgba(255,215,0,.1); border:1px solid rgba(255,215,0,.3);
  border-radius:12px; padding:14px; text-align:center; display:none;
}
.winner-banner.show { display:block; }
.winner-banner h3 { color:#ffd700; font-size:18px; margin-bottom:4px; }
.winner-banner p  { color:#aaa; font-size:13px; }

/* Answer */
.answer-box {
  background:rgba(255,0,80,.08); border:1px solid rgba(255,0,80,.3);
  border-radius:10px; padding:10px 16px; text-align:center;
  margin-top:10px; display:none;
}
.answer-box.show { display:block; }
.answer-label { font-size:11px; color:#aaa; margin-bottom:4px; }
.answer-word  { font-size:24px; font-weight:900; color:#ff0050; letter-spacing:3px; }

/* Leaders */
.leaders { display:flex; flex-direction:column; gap:6px; }
.leader-item {
  display:flex; align-items:center; gap:10px;
  padding:8px 12px; border-radius:10px; background:var(--surface2);
  animation:slideIn .2s ease;
}
.leader-rank { font-size:16px; width:28px; text-align:center; flex-shrink:0; }
.leader-av {
  width:32px; height:32px; border-radius:50%; overflow:hidden;
  background:var(--surface); display:flex; align-items:center;
  justify-content:center; font-size:13px; font-weight:700; color:var(--muted); flex-shrink:0;
}
.leader-av img { width:100%; height:100%; object-fit:cover; }
.leader-name { flex:1; font-size:14px; font-weight:600; }
.leader-word { font-size:12px; color:var(--accent2); background:rgba(37,244,238,.1); padding:2px 8px; border-radius:20px; }
.empty-leaders { text-align:center; color:var(--muted); padding:16px; font-size:13px; }
@keyframes slideIn { from{opacity:0;transform:translateX(-6px)} to{opacity:1;transform:translateX(0)} }

/* Overlay link */
.overlay-link {
  background:var(--surface2); border:1px solid var(--border);
  border-radius:10px; padding:10px 14px;
  font-family:monospace; font-size:12px; color:var(--accent2);
  word-break:break-all; cursor:pointer;
}

  .open-overlay-btn { display:inline-flex; align-items:center; gap:7px; background:linear-gradient(135deg,#8b5cf6,#6d28d9); color:#fff; border:none; font-family:inherit; font-size:13px; font-weight:900; padding:9px 16px; border-radius:10px; cursor:pointer; text-decoration:none; transition:.2s; box-shadow:0 8px 20px -8px #8b5cf6; }
  .open-overlay-btn:hover { transform:translateY(-2px); box-shadow:0 12px 26px -8px #8b5cf6; }
  .overlay-actions { display:flex; gap:8px; align-items:stretch; margin-top:6px; flex-wrap:wrap; }
  .overlay-actions .overlay-link { flex:1; min-width:0; }
</style>
</head>
<body>
<header>
  <div class="logo">💡 خمّن <span>الكلمة</span></div>
  <div class="status-badge" id="status-badge">متوقف</div>
</header>

<div class="container">

  <!-- Category & Word -->
  <div class="card">
    <div class="card-title">اختر تصنيف</div>
    <div class="cats" id="cats"></div>

    <div class="word-preview" id="word-preview"></div>
    <div class="hint-text" id="hint-text"></div>

    <!-- Answer reveal (visible only to admin) -->
    <div class="answer-box" id="answer-box">
      <div class="answer-label">🔐 الجواب (لك فقط)</div>
      <div class="answer-word" id="answer-word"></div>
    </div>

    <div class="actions" style="margin-top:12px">
      <button class="btn btn-random" onclick="randomWord()">🎲 كلمة عشوائية</button>
      <button class="btn btn-start" id="start-btn" onclick="startGame()">▶ ابدأ</button>
      <button class="btn btn-stop"  id="stop-btn"  onclick="stopGame()" disabled>⏹ إيقاف</button>
    </div>

    <div style="margin-top:10px;display:flex;align-items:center;gap:10px;padding:10px;background:var(--surface2);border-radius:10px">
      <input type="checkbox" id="auto-mode" onchange="toggleAuto(this.checked)" style="width:18px;height:18px;accent-color:#1dba72">
      <label for="auto-mode" style="flex:1;font-size:14px;cursor:pointer">
        🔄 <strong>اللعب التلقائي</strong>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">ينتقل لسؤال جديد تلقائياً بعد 5 فائزين</div>
      </label>
    </div>

    <!-- مدة الانتقال + زر التالي -->
    <div style="margin-top:10px;padding:12px;background:var(--surface2);border-radius:10px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <label style="font-size:13px;font-weight:700">⏱️ مدة عرض الجواب قبل السؤال التالي</label>
        <strong id="delay-val" style="color:var(--accent2)">5 ثواني</strong>
      </div>
      <input type="range" id="delay-slider" min="0" max="30" value="5"
        style="width:100%;accent-color:var(--accent2)" oninput="updateDelay(this.value)">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:2px">
        <span>فوري</span><span>10s</span><span>20s</span><span>30s</span>
      </div>
      <button class="btn btn-start" style="width:100%;margin-top:10px" onclick="goNext()">⏭ انتقال فوري للسؤال التالي</button>
    </div>

    <div class="custom-row">
      <input type="text" id="custom-word"  placeholder="كلمة مخصصة...">
      <input type="text" id="custom-hint"  placeholder="تلميح..." style="flex:.8">
      <button class="btn" style="flex:.4;background:var(--surface2);border:1px solid var(--border);color:var(--muted)" onclick="useCustom()">استخدم</button>
    </div>
  </div>

  <!-- Winner flash -->
  <div class="winner-banner" id="winner-banner">
    <h3>🏆 <span id="winner-name"></span></h3>
    <p id="winner-word"></p>
  </div>

  <!-- Leaderboard -->
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div class="card-title" style="margin-bottom:0">🏅 فائزي الجولة</div>
      <button class="btn" style="font-size:12px;padding:4px 12px;background:var(--surface2);border:1px solid var(--border);color:var(--muted)" onclick="clearWinners()">مسح</button>
    </div>
    <div class="leaders" id="leaders-list">
      <div class="empty-leaders">لا يوجد فائزين بعد</div>
    </div>
  </div>

  <!-- All players leaderboard -->
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div class="card-title" style="margin-bottom:0">📊 كل المستخدمين (مجموع النقاط)</div>
      <button class="btn" style="font-size:12px;padding:4px 12px;background:var(--surface2);border:1px solid var(--border);color:var(--muted)" onclick="clearAllStats()">مسح الكل</button>
    </div>
    <div class="leaders" id="all-players-list" style="max-height:400px;overflow-y:auto">
      <div class="empty-leaders">لا يوجد مستخدمين بعد</div>
    </div>
  </div>

  <!-- OBS link -->
  <div class="card">
    <div class="card-title">رابط الـ OBS</div>
    <div class="overlay-actions"><div class="overlay-link" id="overlay-link" onclick="copyLink()">...</div><a class="open-overlay-btn" href="#" id="open-overlay-link" target="_blank" rel="noopener" onclick="return openOverlayInNewTab(this)">🚀 فتح الأوفرلاي</a></div>
    <div style="font-size:12px;color:var(--muted);margin-top:6px">اضغط لنسخ</div>

    <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px">حجم الخط في الـ overlay:</div>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="btn" style="flex:0 0 42px;background:var(--surface2);border:1px solid var(--border);color:#fff;padding:8px;font-size:16px" onclick="changeScale(-0.1)">−</button>
        <span id="scale-val" style="flex:1;text-align:center;font-weight:700;color:var(--accent2)">100%</span>
        <button class="btn" style="flex:0 0 42px;background:var(--surface2);border:1px solid var(--border);color:#fff;padding:8px;font-size:16px" onclick="changeScale(0.1)">+</button>
        <button class="btn" style="flex:0 0 42px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:8px;font-size:14px" onclick="changeScale(0)">↺</button>
      </div>
    </div>
  </div>

</div>

const CATS = ['الكل', ...new Set(WORDS.map(w => w.c))];
let filteredWords = [...WORDS];
let currentWordObj = null;

// Build category tabs
const catsEl = document.getElementById('cats');
CATS.forEach(cat => {
  const el = document.createElement('div');
  el.className = 'cat' + (cat === 'الكل' ? ' active' : '');
  el.textContent = cat;
  el.onclick = () => {
    selectedCat = cat;
    document.querySelectorAll('.cat').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    filteredWords = cat === 'الكل' ? [...WORDS] : WORDS.filter(w => w.c === cat);
  };
  catsEl.appendChild(el);
});

// ── Socket ────────────────────────────────────────────────
if (username) socket.emit('join', { username });

socket.on('guess:won', ({ winner, word, winners, allPlayers }) => {
  document.getElementById('winner-banner').classList.add('show');
  document.getElementById('winner-name').textContent = `🏆 ${winner.name} — المركز ${winner.rank}`;
  document.getElementById('winner-word').textContent = `الكلمة: ${word}`;
  if (winners) renderWinners(winners);
  if (allPlayers) renderAllPlayers(allPlayers);
  // لا نوقف — السيرفر ينتقل لسؤال جديد تلقائياً
});

socket.on('guess:stopped', () => {
  setActive(false);
});

// لما السيرفر ينتقل لسؤال جديد (زر التالي أو تلقائي)
socket.on('guess:started', ({ length, hint, letters, winners: w }) => {
  // استخرج الحروف الظاهرة
  const revealed = (letters || []).map(x => x.i);
  // استخرج الكلمة الكاملة من الحروف
  fetch(`/api/guess/${username}`).then(r => r.json()).then(data => {
    currentWord = data.word;
    currentHint = data.hint;
    showPreview(data.word, data.hint, data.revealed || []);
    if (w) renderWinners(w);
    setActive(true);
    document.getElementById('winner-banner').classList.remove('show');
  });
});

// ── Functions ─────────────────────────────────────────────
function randomWord() {
  const w = filteredWords[Math.floor(Math.random() * filteredWords.length)];
  currentWordObj = w;
  currentWord = w.w;
  currentHint = w.h;
  showPreview(w.w, w.h, []);
  // لو اللعبة نشطة، انتقل فوراً للسؤال الجديد
  if (isActive) startGame();
}

function useCustom() {
  currentWord = document.getElementById('custom-word').value.trim();
  currentHint = document.getElementById('custom-hint').value.trim();
  if (!currentWord) return;
  showPreview(currentWord, currentHint, []);
}

function showPreview(word, hint, revealed) {
  const preview = document.getElementById('word-preview');
  preview.innerHTML = [...word].map((c, i) => {
    const show = revealed.includes(i);
    return `<div class="letter-box ${show ? '' : 'hidden'}">${show ? c : '؟'}</div>`;
  }).join('');
  document.getElementById('hint-text').textContent = hint ? `💡 ${hint}` : '';
  // Show answer to admin
  document.getElementById('answer-word').textContent = word;
  document.getElementById('answer-box').classList.add('show');
}

async function startGame() {
  if (!currentWord) return randomWord(), setTimeout(startGame, 100);
  document.getElementById('winner-banner').classList.remove('show');
  const pool = filteredWords.map(w => ({ w: w.w, h: w.h }));
  const res = await fetch('/api/guess/start', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ username, word: currentWord, hint: currentHint, wordPool: pool }),
  });
  const data = await res.json();
  if (data.ok) setActive(true);
}

async function toggleAuto(enabled) {
  const pool = filteredWords.map(w => ({ w: w.w, h: w.h }));
  await fetch('/api/guess/auto', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ username, enabled, wordPool: pool }),
  });
}

async function updateDelay(seconds) {
  const s = parseInt(seconds);
  document.getElementById('delay-val').textContent = s === 0 ? 'فوري' : `${s} ثانية`;
  await fetch('/api/guess/delay', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ username, delay: s * 1000 }),
  });
}

async function goNext() {
  await fetch('/api/guess/next', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ username }),
  });
}

let overlayScale = 1;
async function changeScale(delta) {
  if (delta === 0) overlayScale = 1;
  else overlayScale = Math.max(0.6, Math.min(2, overlayScale + delta));
  document.getElementById('scale-val').textContent = Math.round(overlayScale * 100) + '%';
  await fetch('/api/guess/scale', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ username, scale: overlayScale }),
  });
}

async function stopGame() {
  await fetch('/api/guess/stop', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ username }),
  });
  setActive(false);
}

function setActive(active) {
  isActive = active;
  document.getElementById('status-badge').textContent = active ? '🟢 نشط' : 'متوقف';
  document.getElementById('status-badge').classList.toggle('active', active);
  document.getElementById('start-btn').disabled = active;
  document.getElementById('stop-btn').disabled  = !active;
}

function renderWinners(winners) {
  const list = document.getElementById('leaders-list');
  if (!winners || !winners.length) {
    list.innerHTML = '<div class="empty-leaders">لا يوجد فائزين بعد</div>';
    return;
  }
  const rankIcon = i => i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}`;
  list.innerHTML = winners.slice(0,5).map((w, i) => `
    <div class="leader-item">
      <span class="leader-rank">${rankIcon(i)}</span>
      <div class="leader-av">${w.avatar ? `<img src="${w.avatar}" onerror="this.parentElement.textContent='${w.name[0]}'">` : w.name[0]}</div>
      <span class="leader-name">${escHtml(w.name)}</span>
      <span class="leader-word">${w.totalWords ? `${w.totalWords} 🔤` : escHtml(w.word || '')}</span>
    </div>`).join('');
}

async function clearWinners() {
  if (!confirm('مسح قائمة الفائزين؟')) return;
  await fetch('/api/guess/clear-winners', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ username }) });
  renderWinners([]);
}

async function clearAllStats() {
  if (!confirm('مسح كل النقاط للمستخدمين؟ لا يمكن التراجع.')) return;
  await fetch('/api/guess/clear-stats', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ username }) });
  renderAllPlayers([]);
}

function renderAllPlayers(players) {
  const list = document.getElementById('all-players-list');
  if (!players || !players.length) {
    list.innerHTML = '<div class="empty-leaders">لا يوجد مستخدمين بعد</div>';
    return;
  }
  list.innerHTML = players.map((p, i) => `
    <div class="leader-item">
      <span class="leader-rank">${i+1}</span>
      <div class="leader-av">${p.avatar ? `<img src="${p.avatar}" onerror="this.parentElement.textContent='${p.name[0]}'">` : p.name[0]}</div>
      <span class="leader-name">${escHtml(p.name)}</span>
      <span class="leader-word">${p.totalWords} 🔤</span>
    </div>`).join('');
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyLink() {
  navigator.clipboard.writeText(overlayUrl);
  const el = document.getElementById('overlay-link');
  el.style.color = '#1dba72';
  setTimeout(() => el.style.color = '', 1500);
}

// Load state
if (username) {
  fetch(`/api/guess/${username}`).then(r => r.json()).then(data => {
    if (data.active) {
      setActive(true);
      showPreview(data.word, data.hint, data.revealed || []);
      currentWord = data.word;
      currentHint = data.hint;
    }
    if (data.winners && data.winners.length) renderWinners(data.winners);
    if (data.allPlayers && data.allPlayers.length) renderAllPlayers(data.allPlayers);
    if (typeof data.scale === 'number') {
      overlayScale = data.scale;
      document.getElementById('scale-val').textContent = Math.round(overlayScale * 100) + '%';
    }
    if (typeof data.transitionDelay === 'number') {
      const s = Math.round(data.transitionDelay / 1000);
      document.getElementById('delay-slider').value = s;
      document.getElementById('delay-val').textContent = s === 0 ? 'فوري' : `${s} ثانية`;
    }
  });
}

// ── Open overlay in new tab (BthLab) ───────────────────
function openOverlayInNewTab(a) {
  var el = document.getElementById('overlay-link');
  var url = (el && el.textContent || '').trim();
  if (!url || url.indexOf('http') !== 0) {
    alert('اتصل بالبث أولاً للحصول على رابط الأوفرلاي');
    return false;
  }
  a.href = url;
  return true;
}
// حدّث href تلقائياً إذا تغيّر النص (مرّة كل ثانية يكفي ولا يحمّل شي)
setInterval(function() {
  var el = document.getElementById('overlay-link');
  var btn = document.getElementById('open-overlay-link');
  if (!el || !btn) return;
  var url = (el.textContent || '').trim();
  if (url.indexOf('http') === 0 && btn.getAttribute('href') !== url) btn.setAttribute('href', url);
}, 1000);

</script>
