<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="rgba(0,0,0,0)">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word War Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
/* 🔬 مؤشر تشخيص - يظهر حالة الاتصال في زاوية الشاشة */
#bthlab-diag {
  position: fixed !important;
  top: 8px !important;
  right: 8px !important;
  z-index: 999999 !important;
  background: rgba(0,0,0,.85) !important;
  color: #fff !important;
  padding: 6px 12px !important;
  border-radius: 20px !important;
  font-family: Arial, sans-serif !important;
  font-size: 11px !important;
  font-weight: 700 !important;
  border: 1.5px solid #fbbf24 !important;
  pointer-events: none !important;
  transition: opacity .4s !important;
}
#bthlab-diag.ok { border-color: #10b981 !important; }
#bthlab-diag.err { border-color: #ef4444 !important; }
/* 🔥 حل قطعي لشاشة سوداء في TikTok LIVE Studio - شفافية مضمونة */
html, body { background: transparent !important; background-color: rgba(0,0,0,0) !important; }
:root { color-scheme: light dark; }
*{margin:0;padding:0;box-sizing:border-box}
body.mobile{transform:scale(0.55);transform-origin:center center}
html,body{background:transparent;width:100vw;height:100vh;font-family:'Tajawal',sans-serif;overflow:hidden;display:flex;align-items:center;justify-content:center}
:root{--scale:1}
.main-box{position:relative;background:rgba(0,0,0,.92);border:2px solid rgba(255,255,255,.12);border-radius:22px;padding:calc(20px * var(--scale)) calc(24px * var(--scale));width:calc(700px * var(--scale));height:calc(460px * var(--scale));opacity:0;pointer-events:none;transition:opacity .15s;overflow:hidden}
.main-box.show{opacity:1}

.game-title{font-size:calc(18px * var(--scale));color:rgba(255,255,255,.5);text-align:center;margin-bottom:calc(6px * var(--scale))}
.game-title span{font-weight:900}
.game-title .red{color:#ef4444}
.game-title .blue{color:#3b82f6}

.category-bar{text-align:center;font-size:calc(22px * var(--scale));font-weight:900;color:#fbbf24;margin-bottom:calc(14px * var(--scale));padding:calc(8px * var(--scale));background:rgba(251,191,36,.08);border-radius:10px;border:1px solid rgba(251,191,36,.2)}

.scoreboard{display:flex;align-items:center;justify-content:center;gap:calc(16px * var(--scale));margin-bottom:calc(14px * var(--scale))}
.team-score{flex:1;text-align:center;padding:calc(12px * var(--scale));border-radius:14px;position:relative;overflow:hidden}
.team-score.red{background:rgba(239,68,68,.12);border:2px solid rgba(239,68,68,.4)}
.team-score.blue{background:rgba(59,130,246,.12);border:2px solid rgba(59,130,246,.4)}
.team-label{font-size:calc(13px * var(--scale));font-weight:700;margin-bottom:calc(4px * var(--scale))}
.team-score.red .team-label{color:#ef4444}
.team-score.blue .team-label{color:#3b82f6}
.team-num{font-size:calc(42px * var(--scale));font-weight:900;color:#fff;line-height:1}
.score-vs{font-size:calc(18px * var(--scale));font-weight:900;color:rgba(255,255,255,.3)}
.score-bar-wrap{height:calc(8px * var(--scale));background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;display:flex;margin-bottom:calc(14px * var(--scale))}
.score-bar-red{height:100%;background:linear-gradient(90deg,#ef4444,#f87171);transition:width .5s ease;border-radius:99px 0 0 99px;min-width:2px}
.score-bar-blue{height:100%;background:linear-gradient(90deg,#60a5fa,#3b82f6);transition:width .5s ease;border-radius:0 99px 99px 0;min-width:2px}

.words-area{display:flex;gap:calc(10px * var(--scale));margin-bottom:calc(10px * var(--scale));height:calc(130px * var(--scale))}
.words-col{flex:1;border-radius:12px;padding:calc(8px * var(--scale));height:100%;overflow:hidden}
.words-col.red{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15)}
.words-col.blue{background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.15)}
.words-col.reg-mode{display:flex;flex-wrap:wrap;align-content:center;justify-content:center;gap:2px;padding:calc(6px * var(--scale))}
.word-chip{display:inline-flex;align-items:center;gap:calc(4px * var(--scale));padding:calc(3px * var(--scale)) calc(10px * var(--scale)) calc(3px * var(--scale)) calc(3px * var(--scale));margin:calc(2px * var(--scale));border-radius:20px;font-size:calc(12px * var(--scale));font-weight:700;animation:chipPop .3s cubic-bezier(0.34,1.56,0.64,1)}
.word-chip .avatar{width:calc(20px * var(--scale));height:calc(20px * var(--scale));border-radius:50%;object-fit:cover;flex-shrink:0}
.words-col.red .word-chip{background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.25)}
.words-col.blue .word-chip{background:rgba(59,130,246,.15);color:#93c5fd;border:1px solid rgba(59,130,246,.25)}
@keyframes chipPop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes joinPop{0%{transform:translateX(-50%) translateY(-20px) scale(.8);opacity:0}100%{transform:translateX(-50%) translateY(0) scale(1);opacity:1}}
@keyframes regPop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}

.timer-row{display:flex;align-items:center;gap:calc(12px * var(--scale));padding:0 calc(4px * var(--scale))}
.timer-bar{flex:1;height:calc(8px * var(--scale));background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden}
.timer-fill{height:100%;background:#fbbf24;border-radius:99px;transition:width .3s linear}
.timer-fill.warn{background:#f59e0b}
.timer-fill.danger{background:#ff0050}
.timer-num{font-size:calc(22px * var(--scale));font-weight:900;color:#fff;font-variant-numeric:tabular-nums;min-width:calc(40px * var(--scale));text-align:center}

.result-banner{display:none;text-align:center;padding:calc(24px * var(--scale));border-radius:14px;position:absolute;inset:0;z-index:10;flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.result-banner.show{display:flex;animation:chipPop .5s cubic-bezier(0.34,1.56,0.64,1)}
.result-banner.red-win{background:rgba(239,68,68,.25);border:2px solid rgba(239,68,68,.5)}
.result-banner.blue-win{background:rgba(59,130,246,.25);border:2px solid rgba(59,130,246,.5)}
.result-banner.tie{background:rgba(251,191,36,.25);border:2px solid rgba(251,191,36,.5)}
.result-text{font-size:calc(32px * var(--scale));font-weight:900;color:#fff}
.result-sub{font-size:calc(16px * var(--scale));color:rgba(255,255,255,.6);margin-top:calc(8px * var(--scale))}

.feed{position:absolute;bottom:calc(8px * var(--scale));left:calc(12px * var(--scale));right:calc(12px * var(--scale));display:flex;flex-direction:column;gap:calc(3px * var(--scale))}
.feed-item{font-size:calc(11px * var(--scale));padding:calc(3px * var(--scale)) calc(8px * var(--scale));border-radius:6px;animation:chipPop .3s ease;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.feed-item.red{background:rgba(239,68,68,.1);color:#fca5a5}
.feed-item.blue{background:rgba(59,130,246,.1);color:#93c5fd}

.confetti-layer{position:absolute;inset:0;pointer-events:none;overflow:hidden}
</style>
<script>
// 🔥 فرض شفافية HTML/body في TikTok LIVE Studio WebView
(function(){
  var setTransparent = function(){
    document.documentElement.style.background = 'transparent';
    document.documentElement.style.backgroundColor = 'rgba(0,0,0,0)';
    if(document.body){
      document.body.style.background = 'transparent';
      document.body.style.backgroundColor = 'rgba(0,0,0,0)';
    }
  };
  setTransparent();
  document.addEventListener('DOMContentLoaded', setTransparent);
  window.addEventListener('load', setTransparent);
})();
</script>
</head>
<body>
<div id="bthlab-diag">🟡 يتصل...</div>
<div class="main-box" id="box">
  <div class="game-title">⚔️ <span class="red">حرب</span> <span class="blue">الكلمات</span></div>
  <div class="category-bar" id="category">—</div>
  <div id="join-keywords" style="display:none;text-align:center;font-size:calc(13px * var(--scale));margin-bottom:calc(6px * var(--scale));color:rgba(255,255,255,.6);font-weight:500"></div>
  <div id="reg-avatars" style="display:none;margin-bottom:calc(8px * var(--scale))">
    <div style="display:flex;gap:calc(6px * var(--scale));align-items:center">
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
        <div style="font-size:calc(10px * var(--scale));color:#ef4444;font-weight:700">🔴 الأحمر</div>
        <div id="red-reg-avatars" style="display:flex;flex-wrap:nowrap;gap:3px;justify-content:center;overflow:hidden;max-height:28px"></div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
        <div style="font-size:calc(10px * var(--scale));color:#3b82f6;font-weight:700">🔵 الأزرق</div>
        <div id="blue-reg-avatars" style="display:flex;flex-wrap:nowrap;gap:3px;justify-content:center;overflow:hidden;max-height:28px"></div>
      </div>
    </div>
  </div>
  <div class="scoreboard">
    <div class="team-score red">
      <div class="team-label">🔴 الفريق الأحمر</div>
      <div class="team-num" id="red-score">0</div>
    </div>
    <div class="score-vs">VS</div>
    <div class="team-score blue">
      <div class="team-label">🔵 الفريق الأزرق</div>
      <div class="team-num" id="blue-score">0</div>
    </div>
  </div>
  <div class="score-bar-wrap">
    <div class="score-bar-red" id="bar-red" style="width:50%"></div>
    <div class="score-bar-blue" id="bar-blue" style="width:50%"></div>
  </div>
  <div class="words-area">
    <div class="words-col red" id="red-words"></div>
    <div class="words-col blue" id="blue-words"></div>
  </div>
  <div class="timer-row" id="timer-row" style="display:none">
    <div class="timer-num" id="timer-num">60</div>
    <div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%"></div></div>
  </div>
  <div class="result-banner" id="result-banner">
    <div class="result-text" id="result-text"></div>
    <div class="result-sub" id="result-sub"></div>
  </div>
  <div class="confetti-layer" id="confetti-layer"></div>
</div>

<script>
if(new URLSearchParams(location.search).get("mobile")==="1")document.body.classList.add("mobile");
const params = new URLSearchParams(location.search);
const cfg = { username: params.get('username') || '' };
const __auth=(function(){var p=new URLSearchParams(location.search);return{key:p.get('key')||'',pw:p.get('pw')||''};})();
const socket = io({ auth:__auth, transports:['websocket','polling'], upgrade:true, reconnection:true, reconnectionDelay:500, reconnectionDelayMax:3000, reconnectionAttempts:Infinity, timeout:10000, withCredentials:false });
// auto-rejoin: ضمان عودة الانضمام للقناة بعد كل اتصال/إعادة اتصال
socket.on('connect',function(){try{if(typeof username!=='undefined'&&username)socket.emit('join', { username: username, key: __auth.key, pw: __auth.pw });}catch(e){}});
socket.io.on('reconnect',function(){try{if(typeof username!=='undefined'&&username)socket.emit('join', { username: username, key: __auth.key, pw: __auth.pw });}catch(e){}});
let timerInt = null, endTime = 0, totalDuration = 60;

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function applyColors(red, blue) {
  var redEl = document.querySelector('.team-score.red');
  var blueEl = document.querySelector('.team-score.blue');
  if (redEl) { redEl.style.background = red + '1f'; redEl.style.borderColor = red + '66'; redEl.querySelector('.team-label').style.color = red; }
  if (blueEl) { blueEl.style.background = blue + '1f'; blueEl.style.borderColor = blue + '66'; blueEl.querySelector('.team-label').style.color = blue; }
  document.getElementById('bar-red').style.background = 'linear-gradient(90deg,' + red + ',' + red + 'cc)';
  document.getElementById('bar-blue').style.background = 'linear-gradient(90deg,' + blue + 'cc,' + blue + ')';
  var redCol = document.querySelector('.words-col.red');
  var blueCol = document.querySelector('.words-col.blue');
  if (redCol) { redCol.style.background = red + '0f'; redCol.style.borderColor = red + '26'; }
  if (blueCol) { blueCol.style.background = blue + '0f'; blueCol.style.borderColor = blue + '26'; }
  window._redColor = red; window._blueColor = blue;
}

function joinRoom() {
  if (!cfg.username) return;
  socket.emit('join', { username: cfg.username, key: __auth.key, pw: __auth.pw });
  fetch(_api(`/api/word-war/${cfg.username}`)).then(r=>r.json()).then(d => {
    if (d.active) {
      document.getElementById('category').textContent = d.category;
      updateScores(d.redScore, d.blueScore);
      renderWords('red', d.redWords || []);
      renderWords('blue', d.blueWords || []);
      const remMs = Math.max(0, d.endTime - Date.now());
      document.getElementById('timer-row').style.display = 'flex';
      startTimer(Math.ceil(remMs/1000), d.duration);
      document.getElementById('box').classList.add('show');
    }
    // Show during registration too
    if (d.registrationOpen) {
      const kw = document.getElementById('join-keywords');
      if (kw) {
        kw.innerHTML = '📝 سجل الآن! — <span style="color:#fca5a5">🔴 اكتب "' + esc(d.redKeyword||'أحمر') + '"</span> أو <span style="color:#93c5fd">🔵 اكتب "' + esc(d.blueKeyword||'أزرق') + '"</span>';
        kw.style.display = 'block';
        kw.style.color = '#1dba72';
        kw.style.fontSize = 'calc(15px * var(--scale))';
      }
      document.getElementById('category').textContent = '📝 مرحلة التسجيل';
      document.getElementById('timer-row').style.display = 'none';
      var ra = document.getElementById('reg-avatars');
      if (ra) ra.style.display = 'block';
      updateScores(d.redScore || 0, d.blueScore || 0);
      document.getElementById('box').classList.add('show');
    }
  });
}
socket.on('connect', joinRoom);
joinRoom();

socket.on('word-war:start', ({ category, duration, redKeyword, blueKeyword, redScore, blueScore }) => {
  playerWordCounts = {};
  document.getElementById('category').textContent = category;
  // Hide registration elements
  var ra = document.getElementById('reg-avatars');
  if (ra) ra.style.display = 'none';
  document.getElementById('red-words').classList.remove('reg-mode');
  document.getElementById('blue-words').classList.remove('reg-mode');
  document.getElementById('red-score').textContent = redScore || '0';
  document.getElementById('blue-score').textContent = blueScore || '0';
  document.getElementById('red-words').innerHTML = '';
  document.getElementById('blue-words').innerHTML = '';
  document.getElementById('result-banner').classList.remove('show','red-win','blue-win','tie');
  updateScores(redScore || 0, blueScore || 0);
  // Show join keywords
  const kw = document.getElementById('join-keywords');
  if (kw) {
    kw.innerHTML = '<span style="color:#fca5a5">🔴 اكتب "' + esc(redKeyword||'أحمر') + '"</span> — <span style="color:#93c5fd">🔵 اكتب "' + esc(blueKeyword||'أزرق') + '"</span>';
    kw.style.display = 'block';
  }
  totalDuration = duration;
  document.getElementById('timer-row').style.display = 'flex';
  startTimer(duration, duration);
  document.getElementById('box').classList.add('show');
});

var playerWordCounts = {};

socket.on('word-war:word', ({ team, word, player, avatar, redScore, blueScore, totalWords }) => {
  updateScores(redScore, blueScore);
  playerWordCounts[player] = totalWords || ((playerWordCounts[player] || 0) + 1);
  const col = document.getElementById(team + '-words');
  const chip = document.createElement('span');
  chip.className = 'word-chip';
  if (avatar) {
    chip.innerHTML = '<img class="avatar" src="' + esc(avatar) + '" alt="">' + esc(word);
  } else {
    chip.innerHTML = esc(word);
  }
  col.prepend(chip);
  while (col.children.length > 5) col.removeChild(col.lastChild);
});

var regVisibleCount = 10;

socket.on('word-war:join', ({ team, player, avatar, redCount, blueCount }) => {
  document.querySelector('.team-score.red .team-label').textContent = '🔴 الأحمر (' + redCount + ')';
  document.querySelector('.team-score.blue .team-label').textContent = '🔵 الأزرق (' + blueCount + ')';
  showJoinConfirm(team, player);
  // Add avatar to words column during registration
  var col = document.getElementById(team + '-words');
  if (col && col.classList.contains('reg-mode')) {
    var borderColor = team === 'red' ? '#ef4444' : '#3b82f6';
    var div = document.createElement('div');
    div.style.cssText = 'width:28px;height:28px;border-radius:50%;border:2px solid '+borderColor+';overflow:hidden;flex-shrink:0;animation:regPop .3s ease;display:inline-block;margin:2px';
    if (avatar) {
      div.innerHTML = '<img src="'+avatar+'" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.textContent=\'?\'">';
    } else {
      div.style.cssText += ';display:inline-flex;align-items:center;justify-content:center;background:rgba(255,255,255,.1);font-size:10px;color:rgba(255,255,255,.4)';
      div.textContent = '?';
    }
    col.appendChild(div);
    while (col.children.length > regVisibleCount) col.removeChild(col.firstChild);
  }
});

// Listen for visible count changes
socket.on('word-war:reg-visible', function(d) {
  regVisibleCount = d.count || 10;
});

// تحديث العدادات عند حذف لاعب من فريق (من صفحة التحكم)
socket.on('word-war:player-removed', function(d) {
  document.querySelector('.team-score.red .team-label').textContent = '🔴 الأحمر (' + d.redCount + ')';
  document.querySelector('.team-score.blue .team-label').textContent = '🔵 الأزرق (' + d.blueCount + ')';
});

function showJoinConfirm(team, name) {
  var existing = document.getElementById('join-confirm');
  if (existing) existing.remove();
  var div = document.createElement('div');
  div.id = 'join-confirm';
  var bgColor = team === 'red' ? 'rgba(239,68,68,.9)' : 'rgba(59,130,246,.9)';
  var emoji = team === 'red' ? '🔴' : '🔵';
  div.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:' + bgColor + ';color:#fff;padding:10px 24px;border-radius:12px;font-size:14px;font-weight:700;z-index:200;animation:joinPop .4s ease;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.3)';
  div.textContent = emoji + ' ' + name + ' انضم!';
  document.body.appendChild(div);
  setTimeout(function() { if (div.parentNode) div.remove(); }, 2500);
}

socket.on('word-war:registration', ({ open, redKeyword, blueKeyword }) => {
  const kw = document.getElementById('join-keywords');
  const ra = document.getElementById('reg-avatars');
  if (open && kw) {
    stopTimer();
    document.getElementById('timer-row').style.display = 'none';
    document.getElementById('result-banner').classList.remove('show','red-win','blue-win','tie');
    kw.innerHTML = '📝 سجل الآن! — <span style="color:#fca5a5">🔴 اكتب "' + esc(redKeyword) + '"</span> أو <span style="color:#93c5fd">🔵 اكتب "' + esc(blueKeyword) + '"</span>';
    kw.style.display = 'block';
    kw.style.color = '#1dba72';
    kw.style.fontSize = 'calc(15px * var(--scale))';
    document.getElementById('category').textContent = '📝 مرحلة التسجيل';
    document.getElementById('box').classList.add('show');
    // Use words area for registration avatars
    document.getElementById('red-words').innerHTML = '';
    document.getElementById('blue-words').innerHTML = '';
    document.getElementById('red-words').classList.add('reg-mode');
    document.getElementById('blue-words').classList.add('reg-mode');
    if (ra) ra.style.display = 'none';
  }
});

socket.on('word-war:lock', ({ locked }) => {
  const kw = document.getElementById('join-keywords');
  if (kw) {
    if (locked) { kw.innerHTML = '🔒 التسجيل مقفل'; kw.style.color = '#ef4444'; }
    else { kw.style.color = 'rgba(255,255,255,.6)'; }
  }
  stopTimer();
  document.getElementById('timer-row').style.display = 'none';
});

socket.on('word-war:teams-cleared', () => {
  stopTimer();
  document.getElementById('timer-row').style.display = 'none';
  document.getElementById('red-score').textContent = '0';
  document.getElementById('blue-score').textContent = '0';
  updateScores(0, 0);
  document.getElementById('red-words').innerHTML = '';
  document.getElementById('blue-words').innerHTML = '';
  document.getElementById('red-words').classList.remove('reg-mode');
  document.getElementById('blue-words').classList.remove('reg-mode');
  document.getElementById('result-banner').classList.remove('show','red-win','blue-win','tie');
  document.querySelector('.team-score.red .team-label').textContent = '🔴 الأحمر (0)';
  document.querySelector('.team-score.blue .team-label').textContent = '🔵 الأزرق (0)';
  document.getElementById('red-reg-avatars').innerHTML = '';
  document.getElementById('blue-reg-avatars').innerHTML = '';
  playerWordCounts = {};
});

socket.on('word-war:end', (result) => {
  stopTimer();
  const banner = document.getElementById('result-banner');
  const text = document.getElementById('result-text');
  const sub = document.getElementById('result-sub');
  banner.classList.remove('red-win','blue-win','tie');
  if (result.winner === 'red') {
    banner.classList.add('red-win');
    text.textContent = '🔴 الفريق الأحمر يفوز!';
  } else if (result.winner === 'blue') {
    banner.classList.add('blue-win');
    text.textContent = '🔵 الفريق الأزرق يفوز!';
  } else {
    banner.classList.add('tie');
    text.textContent = '🤝 تعادل!';
  }
  sub.textContent = `${result.redScore} - ${result.blueScore}`;
  banner.classList.add('show');
  fireConfetti();
});

socket.on('word-war:stopped', () => {
  stopTimer();
  document.getElementById('box').classList.remove('show');
});

function updateScores(r, b) {
  document.getElementById('red-score').textContent = r;
  document.getElementById('blue-score').textContent = b;
  const total = Math.max(1, r + b);
  document.getElementById('bar-red').style.width = (r / total * 100) + '%';
  document.getElementById('bar-blue').style.width = (b / total * 100) + '%';
}

function renderWords(team, words) {
  const col = document.getElementById(team + '-words');
  col.innerHTML = words.slice(-20).map(w => `<span class="word-chip">${esc(w)}</span>`).join('');
}

function startTimer(remaining, duration) {
  endTime = Date.now() + remaining * 1000;
  totalDuration = duration || remaining;
  if (timerInt) clearInterval(timerInt);
  updateTimer();
  timerInt = setInterval(updateTimer, 200);
}
function stopTimer() { if (timerInt) clearInterval(timerInt); timerInt = null; }
function updateTimer() {
  const remMs = Math.max(0, endTime - Date.now());
  const sec = Math.ceil(remMs / 1000);
  const fill = document.getElementById('timer-fill');
  const num = document.getElementById('timer-num');
  num.textContent = sec;
  const ratio = Math.max(0, Math.min(1, remMs / (totalDuration * 1000)));
  fill.style.width = (ratio * 100) + '%';
  fill.classList.remove('warn','danger');
  if (sec <= 5) fill.classList.add('danger');
  else if (sec <= 15) fill.classList.add('warn');
  if (remMs <= 0) { clearInterval(timerInt); timerInt = null; }
}

function fireConfetti() {
  const layer = document.getElementById('confetti-layer');
  const box = document.getElementById('box');
  const colors = ['#ef4444','#3b82f6','#fbbf24','#1dba72','#a855f7','#ec4899'];
  const cx = box.offsetWidth / 2, cy = box.offsetHeight / 2;
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    p.style.cssText = `position:absolute;width:8px;height:12px;left:${cx}px;top:${cy}px;background:${colors[i%colors.length]};border-radius:2px;`;
    layer.appendChild(p);
    const angle = Math.random() * Math.PI * 2;
    const dist = 100 + Math.random() * 250;
    p.animate([
      { transform:'translate(0,0) rotate(0deg)', opacity:1 },
      { transform:`translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px) rotate(${720+Math.random()*720}deg)`, opacity:0 }
    ], { duration:1500+Math.random()*500, easing:'cubic-bezier(0.4,0,0.6,1)' });
    setTimeout(() => p.remove(), 2100);
  }
}
</script>
<script>
// 🔬 مؤشر تشخيص للأوفرلاي - يعرض حالة الاتصال
(function(){
  var el = document.getElementById('bthlab-diag');
  if (!el) return;
  var joinedRoom = false;
  var checkInterval = setInterval(function(){
    if (typeof socket === 'undefined') return;
    clearInterval(checkInterval);
    
    var qs = new URLSearchParams(location.search);
    var u = qs.get('username') || qs.get('user') || '';
    var hasKey = !!(qs.get('key') || qs.get('pw'));
    
    if (!u) {
      el.className = 'err';
      el.textContent = '❌ URL ناقص username';
      return;
    }
    if (!hasKey) {
      el.className = 'err';
      el.textContent = '⚠️ URL ناقص key';
      return;
    }
    
    function update() {
      if (socket.connected) {
        el.className = 'ok';
        el.textContent = joinedRoom ? ('🟢 متصل · @' + u) : ('🟡 انضمام...');
        if (joinedRoom) {
          setTimeout(function(){ el.style.opacity = '0'; setTimeout(function(){ el.style.display = 'none'; }, 400); }, 8000);
        }
      } else {
        el.className = '';
        el.textContent = '🟡 يتصل بالسيرفر...';
        el.style.opacity = '1';
        el.style.display = 'block';
      }
    }
    
    socket.on('connect', update);
    socket.on('disconnect', function(){
      el.className = 'err';
      el.textContent = '🔴 انقطع الاتصال';
      el.style.opacity = '1';
      el.style.display = 'block';
    });
    socket.on('connect_error', function(err){
      el.className = 'err';
      el.textContent = '❌ فشل: ' + (err.message||'').slice(0,25);
      el.style.opacity = '1';
      el.style.display = 'block';
    });
    // نعرف إن انضممنا للقناة لما يوصل أي event من السيرفر
    var origOn = socket.on.bind(socket);
    ['stats','room:status','wheel:update','knockout:register','knockout:question','password:update','quiz:start','poll:start','word-war:update','guess:update','history','viewers'].forEach(function(evt){
      socket.on(evt, function(){ if (!joinedRoom) { joinedRoom = true; update(); } });
    });
    update();
  }, 50);
})();
</script>
