<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Transparent Test</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  background: transparent !important;
  background-color: rgba(0, 0, 0, 0) !important;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}
/* دائرة حمراء صغيرة في المنتصف - لو ظهرت وحدها = الشفافية شغالة */
.dot {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 100px;
  height: 100px;
  background: red;
  border-radius: 50%;
  box-shadow: 0 0 30px rgba(255,0,0,.8);
}
.label {
  position: absolute;
  top: calc(50% + 70px);
  left: 50%;
  transform: translateX(-50%);
  color: #fff;
  font-size: 20px;
  font-weight: bold;
  font-family: Arial;
  background: rgba(0,0,0,.8);
  padding: 8px 20px;
  border-radius: 20px;
  white-space: nowrap;
}
</style>
</head>
<body>
<div class="dot"></div>
<div class="label">إذا شفت هذا فقط = الشفافية شغّالة ✅</div>
</body>
</html>
